<VirtualHost *:80>
    ServerName sistema-gestor-de-activos-87080374122.us-central1.run.app

    # Redirección de HTTP a HTTPS
    Redirect permanent / https://sistema-gestor-de-activos-87080374122.us-central1.run.app/
</VirtualHost>

<VirtualHost *:443>
    ServerName sistema-gestor-de-activos-87080374122.us-central1.run.app

    DocumentRoot /var/www/html/public

    # Configuración SSL (Google Cloud Run ya maneja HTTPS)
    # Si estás usando HTTPS en Cloud Run, no necesitas configuración SSL manual
    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/ssl-cert-snakeoil.pem
    SSLCertificateKeyFile /etc/ssl/private/ssl-cert-snakeoil.key
    SSLCertificateChainFile /etc/ssl/certs/ssl-cert-snakeoil.pem

    <Directory /var/www/html/public>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
